name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  GO_VERSION: "1.22"
  COVERAGE_DIR: coverage

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v4
        with:
          version: latest
          args: --timeout=5m

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Run unit tests
        run: go test -short -v -race -coverprofile=${{ env.COVERAGE_DIR }}/unit.out -covermode=atomic ./...

      - name: Upload unit test coverage
        uses: actions/upload-artifact@v4
        with:
          name: unit-coverage
          path: ${{ env.COVERAGE_DIR }}/unit.out

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Run integration tests
        run: go test -tags=integration -v -race -coverprofile=${{ env.COVERAGE_DIR }}/integration.out -covermode=atomic ./...
        env:
          INTEGRATION_TESTING: true

      - name: Upload integration test coverage
        uses: actions/upload-artifact@v4
        with:
          name: integration-coverage
          path: ${{ env.COVERAGE_DIR }}/integration.out

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Run Gosec security scanner
        uses: securego/gosec@master
        with:
          args: '-no-fail -stdout ./...'

      - name: Run vulnerability scan
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test, security]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Build node binary
        run: go build -ldflags "-s -w" -o kerrigan-node ./cmd/node

      - name: Build CLI binary
        run: go build -ldflags "-s -w" -o kerrigan-cli ./cmd/cli

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: binaries
          path: |
            kerrigan-node
            kerrigan-cli

  coverage:
    name: Coverage Report
    runs-on: ubuntu-latest
    needs: [test, integration]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download unit coverage
        uses: actions/download-artifact@v4
        with:
          name: unit-coverage
          path: ${{ env.COVERAGE_DIR }}

      - name: Download integration coverage
        uses: actions/download-artifact@v4
        with:
          name: integration-coverage
          path: ${{ env.COVERAGE_DIR }}

      - name: Combine coverage
        run: |
          cat ${{ env.COVERAGE_DIR }}/unit.out >> ${{ env.COVERAGE_DIR }}/combined.out || true
          cat ${{ env.COVERAGE_DIR }}/integration.out >> ${{ env.COVERAGE_DIR }}/combined.out || true

      - name: Generate coverage report
        run: |
          go tool cover -func=${{ env.COVERAGE_DIR }}/unit.out
          go tool cover -html=${{ env.COVERAGE_DIR }}/unit.out -o ${{ env.COVERAGE_DIR }}/coverage.html

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: ${{ env.COVERAGE_DIR }}/coverage.html
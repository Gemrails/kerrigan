run:
  timeout: 5m
  tests: true
  skip-dirs:
    - vendor
    - tests
    - docs
  skip-files:
    - ".*_test.go"

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - misspell
    - unconvert
    - unparam
    - gocritic
    - gosec
    - goheader
    - gofmt
    - goimports

linters-settings:
  errcheck:
    check-type-assertions: true
    check-blank: true

  govet:
    enable-all: true

  gosec:
    excludes:
      - G104

  gocritic:
    enabled-tags:
      - diagnostic
      - style
      - performance

  gofmt:
    simplify: true

  goimports:
    local-prefixes: github.com/kerrigan/kerrigan

  misspell:
    locale: US

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - gosec
        - gocritic

output:
  format: colored-line-number
  print-issued-lines: true
  print-linter-name: true